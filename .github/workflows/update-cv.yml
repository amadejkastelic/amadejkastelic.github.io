name: Update CV

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "CV commit SHA"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35

      - name: Bump cv flake input
        run: nix flake lock --update-input cv

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: bump cv to ${{ github.event.inputs.sha }}" || echo "no changes"
          git push

  deploy:
    needs: update
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
